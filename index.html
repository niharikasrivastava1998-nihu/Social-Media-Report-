<!DOCTYPE html>
<html>
<head>
    <title>BFL Social Media Report</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 40px; background: #f4f7f6; }
        .box { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        #summaryText { margin-top: 20px; padding: 15px; background: #f9f9f9; border-left: 4px solid #007bff; white-space: pre-wrap; display: none; font-size: 14px; line-height: 1.6; }
        .btn { display: none; width: 100%; padding: 12px; margin-top: 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-mail { background: #db4437; color: white; }
    </style>
</head>
<body>

<div class="box">
    <h2>📊 BFL Monthly Summary</h2>
    <p>Upload <b>Demo Sheet 1</b> to extract Monthly Metrics.</p>
    
    <input type="file" id="upload" accept=".xlsx, .xls" />
    
    <div id="summaryText"></div>
    <button id="mailBtn" class="btn btn-mail" onclick="sendMail()">📧 Open Gmail</button>
</div>

<script>
    let generatedReport = "";

    document.getElementById('upload').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            const data = new Uint8Array(event.target.result);
            const wb = XLSX.read(data, {type: 'array'});
            const ws = wb.Sheets[wb.SheetNames[0]];
            
            // We convert to a 2D array (Address by [Row][Col])
            const dataArray = XLSX.utils.sheet_to_json(ws, {header: 1});

            // TARGETING "MONTHLY" COLUMN (Col Index 2, 7, and 12)
            const getMetrics = (col) => {
                return {
                    er: (parseFloat(dataArray[1][col] || 0) * 100).toFixed(2) + "%",
                    posts: dataArray[2][col] || 0,
                    followers: (dataArray[3][col] || 0).toLocaleString()
                };
            };

            const facebook = getMetrics(2);  // Column C
            const instagram = getMetrics(7); // Column H
            const linkedin = getMetrics(12); // Column M

            let report = `Hi Leadership Team,\n\nMonthly Social Media Performance Summary:\n\n`;
            
            report += `📍 FACEBOOK\n`;
            report += `• Engagement Rate: ${facebook.er}\n• Posts: ${facebook.posts}\n• Followers: ${facebook.followers}\n\n`;

            report += `📍 INSTAGRAM\n`;
            report += `• Engagement Rate: ${instagram.er}\n• Posts: ${instagram.posts}\n• Followers: ${instagram.followers}\n\n`;

            report += `📍 LINKEDIN\n`;
            report += `• Engagement Rate: ${linkedin.er}\n• Posts: ${linkedin.posts}\n• Followers: ${linkedin.followers}\n\n`;

            report += `Best Regards,\nEmployer Branding Team`;

            generatedReport = report;
            document.getElementById('summaryText').innerText = report;
            document.getElementById('summaryText').style.display = "block";
            document.getElementById('mailBtn').style.display = "block";
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    function sendMail() {
        const subject = encodeURIComponent("Monthly Social Media Report - BFL");
        const body = encodeURIComponent(generatedReport);
        window.location.href = `mailto:?subject=${subject}&body=${body}`;
    }
</script>

</body>
</html>
